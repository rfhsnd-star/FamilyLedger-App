<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FamilyLedger</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .rounded-xl-custom { border-radius: 1.25rem; }
        .bg-glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">
    <div id="app" class="max-w-md mx-auto p-4">
        
        <!-- LOGIN SECTION -->
        <div id="auth-section" class="hidden mt-20 bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
            <h1 class="text-3xl font-black mb-2">FamilyLedger</h1>
            <p class="text-slate-500 mb-8">Household finance, simplified.</p>
            <div class="space-y-4">
                <input id="email" type="email" placeholder="Email" class="w-full p-4 rounded-2xl border bg-slate-50 outline-none focus:ring-2 focus:ring-indigo-600">
                <input id="password" type="password" placeholder="Password" class="w-full p-4 rounded-2xl border bg-slate-50 outline-none focus:ring-2 focus:ring-indigo-600">
                <div class="grid grid-cols-2 gap-3 pt-2">
                    <button onclick="handleSignIn()" class="bg-indigo-600 text-white font-bold p-4 rounded-2xl shadow-lg active:scale-95 transition-all">Sign In</button>
                    <button onclick="handleSignUp()" class="border-2 border-slate-200 text-slate-600 font-bold p-4 rounded-2xl active:scale-95 transition-all">Join</button>
                </div>
                <p id="auth-error" class="text-red-500 text-xs text-center"></p>
            </div>
        </div>

        <!-- DASHBOARD SECTION -->
        <div id="dashboard-section" class="hidden space-y-6 pb-20">
            <header class="flex justify-between items-center py-4">
                <div>
                    <h2 class="text-2xl font-black">FamilyLedger</h2>
                    <p id="user-display" class="text-[10px] text-slate-400 font-bold uppercase tracking-wider"></p>
                </div>
                <button onclick="handleSignOut()" class="bg-white p-2 rounded-full border shadow-sm text-slate-400 hover:text-red-500"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
            </header>

            <!-- Total Card -->
            <div class="bg-slate-900 p-8 rounded-[2.5rem] text-white shadow-2xl">
                <p class="text-xs opacity-60 font-bold uppercase tracking-widest mb-1">Total Expenses (IDR)</p>
                <h3 id="total-amount" class="text-4xl font-black tracking-tight">Rp 0</h3>
            </div>

            <!-- AI Scan Section -->
            <div class="space-y-4">
                <button onclick="document.getElementById('camera-input').click()" class="w-full bg-white p-6 rounded-[2rem] border-2 border-dashed border-indigo-200 flex items-center justify-center gap-3 text-indigo-600 hover:bg-indigo-50 transition-all group">
                    <div id="camera-icon" class="bg-indigo-100 p-3 rounded-2xl group-hover:scale-110 transition-transform">📸</div>
                    <span id="camera-text" class="font-bold">Scan Receipt (AI)</span>
                </button>
                <input type="file" id="camera-input" accept="image/*" capture="environment" class="hidden" onchange="processReceipt(event)">
                
                <div id="ai-results" class="hidden bg-indigo-50 p-6 rounded-[2rem] border-2 border-indigo-200 shadow-lg">
                    <h4 id="res-merchant" class="font-black text-indigo-900 text-lg mb-4">Scanning...</h4>
                    <div id="res-splits" class="space-y-2 mb-6"></div>
                    <button onclick="saveToDatabase('ai')" class="w-full bg-indigo-600 text-white font-bold p-4 rounded-2xl shadow-lg">Confirm & Save</button>
                </div>
            </div>

            <!-- Manual Entry Section -->
            <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm space-y-4">
                <h3 class="font-black text-slate-800">Add Manually</h3>
                <div class="space-y-3">
                    <div class="relative">
                        <span class="absolute left-4 top-4 text-slate-400 font-bold">Rp</span>
                        <input id="manual-amount" type="number" placeholder="0" class="w-full p-4 pl-12 rounded-2xl border bg-slate-50 font-mono font-bold">
                    </div>
                    <select id="manual-category" class="w-full p-4 rounded-2xl border bg-slate-50 font-bold text-slate-600 appearance-none"></select>
                    <input id="manual-note" type="text" placeholder="Note (Optional)" class="w-full p-4 rounded-2xl border bg-slate-50">
                    <button onclick="saveManualExpense()" class="w-full bg-slate-800 text-white font-bold p-4 rounded-2xl active:scale-95 transition-all">Save Expense</button>
                </div>
            </div>

            <!-- Recent Activity -->
            <div class="space-y-4">
                <h3 class="font-black text-slate-800 px-2">Recent Activity</h3>
                <div id="transaction-list" class="space-y-3"></div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
